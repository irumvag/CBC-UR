<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Event Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
    }

    header {
      background: #2b6cb0;
      color: white;
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    header h1 { font-size: 1.4rem; font-weight: 600; }
    header span { font-size: 1.6rem; }

    main {
      max-width: 960px;
      margin: 2rem auto;
      padding: 0 1.5rem;
      display: grid;
      gap: 2rem;
      grid-template-columns: 1fr 1.6fr;
      align-items: start;
    }

    @media (max-width: 680px) { main { grid-template-columns: 1fr; } }

    .card {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1.25rem;
      color: #2d3748;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Form */
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: 0.8rem; font-weight: 600; color: #4a5568; margin-bottom: 0.3rem; }
    input, textarea {
      width: 100%;
      padding: 0.55rem 0.75rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 7px;
      font-size: 0.9rem;
      font-family: inherit;
      transition: border-color 0.15s;
      background: #f7fafc;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #4299e1;
      background: white;
    }
    textarea { resize: vertical; min-height: 72px; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 7px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: #3182ce; color: white; width: 100%; justify-content: center; }
    .btn-primary:hover { background: #2b6cb0; }
    .btn-danger { background: #fff5f5; color: #c53030; padding: 0.35rem 0.65rem; font-size: 0.8rem; }
    .btn-danger:hover { background: #fed7d7; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      padding: 0.75rem 1.25rem;
      border-radius: 9px;
      font-size: 0.88rem;
      font-weight: 500;
      color: white;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      z-index: 100;
      max-width: 320px;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { background: #276749; }
    #toast.error   { background: #c53030; }

    /* Events list */
    #events-count {
      font-size: 0.8rem;
      color: #718096;
      margin-bottom: 1rem;
    }

    .event-item {
      border: 1.5px solid #e2e8f0;
      border-radius: 9px;
      padding: 1rem 1.1rem;
      margin-bottom: 0.75rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.75rem;
      transition: border-color 0.15s;
    }
    .event-item:hover { border-color: #bee3f8; }
    .event-item:last-child { margin-bottom: 0; }

    .event-info { flex: 1; min-width: 0; }
    .event-name { font-weight: 600; font-size: 0.95rem; margin-bottom: 0.3rem; word-break: break-word; }
    .event-meta { font-size: 0.8rem; color: #718096; line-height: 1.6; }
    .event-meta span { display: inline-flex; align-items: center; gap: 0.25rem; }
    .event-desc { font-size: 0.82rem; color: #4a5568; margin-top: 0.35rem; font-style: italic; }

    .badge {
      display: inline-block;
      padding: 0.15rem 0.55rem;
      border-radius: 99px;
      font-size: 0.7rem;
      font-weight: 600;
      background: #ebf8ff;
      color: #2b6cb0;
      margin-bottom: 0.4rem;
    }

    .empty-state {
      text-align: center;
      padding: 2.5rem 1rem;
      color: #a0aec0;
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .empty-state p { font-size: 0.9rem; }

    .loading { text-align: center; padding: 2rem; color: #a0aec0; font-size: 0.9rem; }
  </style>
</head>
<body>

<header>
  <span>🎓</span>
  <h1>Campus Event Manager</h1>
</header>

<main>
  <!-- Add Event Form -->
  <div class="card">
    <h2>Add Event</h2>
    <form id="add-form">
      <div class="form-group">
        <label for="name">Event Name *</label>
        <input id="name" type="text" placeholder="e.g. Spring Hackathon" required />
      </div>
      <div class="form-group">
        <label for="date">Date * (YYYY-MM-DD)</label>
        <input id="date" type="date" required />
      </div>
      <div class="form-group">
        <label for="location">Location *</label>
        <input id="location" type="text" placeholder="e.g. CS Building, Room 101" required />
      </div>
      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" placeholder="Optional details about the event…"></textarea>
      </div>
      <button type="submit" class="btn btn-primary">➕ Add Event</button>
    </form>
  </div>

  <!-- Events List -->
  <div class="card">
    <h2>Upcoming Events</h2>
    <div id="events-count"></div>
    <div id="events-list"><div class="loading">Loading…</div></div>
  </div>
</main>

<div id="toast"></div>

<script>
  const API = '/api/events';
  let toastTimer;

  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ''; }, 3200);
  }

  function formatDate(dateStr) {
    const [y, m, d] = dateStr.split('-');
    return new Date(y, m - 1, d).toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
  }

  function daysUntil(dateStr) {
    const today = new Date(); today.setHours(0,0,0,0);
    const [y, m, d] = dateStr.split('-');
    const eventDate = new Date(y, m - 1, d);
    const diff = Math.round((eventDate - today) / 86400000);
    if (diff === 0) return 'Today';
    if (diff === 1) return 'Tomorrow';
    return `In ${diff} days`;
  }

  async function loadEvents() {
    const list = document.getElementById('events-list');
    const count = document.getElementById('events-count');
    try {
      const res = await fetch(API);
      const events = await res.json();
      if (!events.length) {
        count.textContent = '';
        list.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>No upcoming events.<br>Add one using the form.</p></div>`;
        return;
      }
      count.textContent = `${events.length} event${events.length !== 1 ? 's' : ''} scheduled`;
      list.innerHTML = events.map(e => `
        <div class="event-item" id="event-${CSS.escape(e.id)}">
          <div class="event-info">
            <div class="badge">${daysUntil(e.date)}</div>
            <div class="event-name">${escHtml(e.name)}</div>
            <div class="event-meta">
              <span>📅 ${formatDate(e.date)}</span> &nbsp;
              <span>📍 ${escHtml(e.location)}</span>
            </div>
            ${e.description ? `<div class="event-desc">${escHtml(e.description)}</div>` : ''}
          </div>
          <button class="btn btn-danger" onclick="deleteEvent(${JSON.stringify(e.name)})">🗑 Delete</button>
        </div>
      `).join('');
    } catch {
      list.innerHTML = `<div class="empty-state"><p>Could not load events.</p></div>`;
    }
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('add-form').addEventListener('submit', async e => {
    e.preventDefault();
    const payload = {
      name:        document.getElementById('name').value.trim(),
      date:        document.getElementById('date').value,
      location:    document.getElementById('location').value.trim(),
      description: document.getElementById('description').value.trim()
    };
    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok) { toast(data.error, 'error'); return; }
      toast(`"${data.name}" added!`);
      e.target.reset();
      loadEvents();
    } catch {
      toast('Network error. Is the server running?', 'error');
    }
  });

  async function deleteEvent(name) {
    if (!confirm(`Delete "${name}"?`)) return;
    try {
      const res = await fetch(`${API}/${encodeURIComponent(name)}`, { method: 'DELETE' });
      const data = await res.json();
      if (!res.ok) { toast(data.error, 'error'); return; }
      toast(`"${name}" deleted.`);
      loadEvents();
    } catch {
      toast('Network error.', 'error');
    }
  }

  loadEvents();
</script>
</body>
</html>
